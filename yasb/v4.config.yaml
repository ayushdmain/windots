## ============================================================================
## GLOBAL SETTINGS
## ============================================================================
watch_stylesheet: true   
watch_config: true       
debug: false
update_check: true

## ============================================================================
## BAR CONFIGURATION
## ============================================================================
bars:
  primary-bar:
    enabled: true
    class_name: "yasb-bar"
    alignment: 
      position: "top"
      center: false 
    dimensions:
      width: "100%"
      height: 28 
    padding:  
      top: 0
      left: 0
      bottom: 0
      right: 0
    window_flags:  
      always_on_top: false
      windows_app_bar: true 
    blur_effect:  
      enabled: false 
    widgets:
      left: 
        - "workspaces"
        # - "window"
        - "media"
      center: []
      right:
        - "systray"
        # We start the Powerline block here. (Skipped Privacy/Idle to match Windows)
        - "sep_vol"
        - "volume"
        - "battery"
        - "sep_net"
        - "wifi"
        - "bluetooth"
        - "sep_clock"
        - "clock"
        - "sep_os"
        - "os_button"

## ============================================================================
## WIDGET DEFINITIONS
## ============================================================================
widgets:

  # ---------------------------------------------------------------------------
  # LEFT MODULES
  # ---------------------------------------------------------------------------
  workspaces:
    type: "glazewm.workspaces.GlazewmWorkspacesWidget"
    options:
      populated_label: "{name}"
      empty_label: "{name}"
      active_populated_label: "{name}"
      active_empty_label: "{name}"
      hide_empty_workspaces: false

  window:
    type: "yasb.active_window.ActiveWindowWidget"
    options:
      label: "{win[title]}"
      max_length: 50
      max_length_ellipsis: "..."
    
  media:  
    type: "yasb.media.MediaWidget"
    options:
      # ADDED SPACES: Pushes the text away from the play controls!
      label: "у°ҺҶ {title}   "
      label_alt: "у°ҺҶ {title} - {artist}   "
      hide_empty: true
      show_thumbnail: false
      controls_hide: false    
      controls_left: false     
      max_field_size:
        label: 30
        label_alt: 45
      icons:
        prev_track: "у°’®"
        next_track: "у°’ӯ"
        play: "у°җҠ"
        pause: "у°ҸӨ"
      callbacks: 
        on_left: "toggle_media_menu"
        on_right: "toggle_label"
      media_menu: 
        blur: false
        border_color: "#cba6f7" 
        alignment: "left"
        direction: "down"
        thumbnail_size: 96        # Bumped up the size
        thumbnail_corner_radius: 8 # Made the album art nicely rounded
        show_source: false        # Turned off the tiny source badge to make it cleaner

  # ---------------------------------------------------------------------------
  # RIGHT MODULES (POWERLINE BLOCK)
  # ---------------------------------------------------------------------------
  systray:
    type: "yasb.systray.SystrayWidget"
    options:
      icon_size: 16
      label_position: "right"
      show_unpinned: false

  volume:
    type: "yasb.volume.VolumeWidget"
    options:
      label: "{icon} {level}"
      label_alt: "о»Ё"
      volume_icons: ["пҖҰ", "пҖ§", "пҖ§", "пҖЁ", "пҖЁ"]
      callbacks:
        on_left: "toggle_volume_menu"
        on_right: "toggle_mute"
      audio_menu:
        blur: false
        border_color: "system"
        alignment: "center"
        direction: "down"

  battery:
    type: "yasb.battery.BatteryWidget"
    options:
      label: "{icon} {percent}%"
      status_icons: 
        icon_charging: "пғ§"
        icon_critical: "пү„"
        icon_low: "пүғ"
        icon_medium: "пүӮ"
        icon_high: "пүҒ"
        icon_full: "пүҖ"

  wifi:
    type: "yasb.wifi.WifiWidget"
    options:
      label: "у°–© {wifi_name}"
      label_alt: "у°ҲҖ ethernet"
      update_interval: 5000
      callbacks:
        on_left: "toggle_menu"
        on_right: "toggle_label"
      menu_config:
        blur: false
        alignment: "right"
        direction: "down"

  bluetooth:
    type: "yasb.bluetooth.BluetoothWidget"
    options:
      label: "пҠ” {percent}"
      label_alt: "пҠ” {device_count} connected"
      callbacks: 
        on_right: "toggle_label"

  clock:
    type: "yasb.clock.ClockWidget"
    options:
      label: "{%d/%m %H:%M}"
      calendar: 
        blur: false
        alignment: "right"
        direction: "down"

  os_button:
    type: "yasb.custom.CustomWidget"
    options:
      class_name: "os-button"
      label: "пҢғ"
      callbacks:
        on_left: "exec cmd.exe /c start explorer.exe shell:::{2559a1f8-21d7-11d4-bdaf-00c04f60b9f0}"

  # ---------------------------------------------------------------------------
  # POWERLINE SEPARATORS
  # ---------------------------------------------------------------------------
  sep_vol:
    type: "yasb.custom.CustomWidget"
    options:
      class_name: "sep-vol"
      label: "оӮІ"
  
  sep_net:
    type: "yasb.custom.CustomWidget"
    options:
      class_name: "sep-net"
      label: "оӮІ"

  sep_clock:
    type: "yasb.custom.CustomWidget"
    options:
      class_name: "sep-clock"
      label: "оӮІ"

  sep_os:
    type: "yasb.custom.CustomWidget"
    options:
      class_name: "sep-os"
      label: "оӮІ"