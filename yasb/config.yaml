## ============================================================================
## GLOBAL SETTINGS
## ============================================================================
watch_stylesheet: true   
watch_config: true       
debug: false
update_check: true

## ============================================================================
## BAR CONFIGURATION
## ============================================================================
bars:
  primary-bar:
    enabled: true
    class_name: "yasb-bar"
    
    alignment: 
      position: "top"
      center: true 
    
    dimensions:
      width: "100%"
      height: 33 
    
    padding:  
      top: 0
      left: 0
      bottom: 0
      right: 0 
    
    window_flags:  
      always_on_top: false
      windows_app_bar: true 
    
    blur_effect:  
      enabled: true
      acrylic: false
      dark_mode: false 
    
    widgets:
      left: 
        - "arch_logo"
        - "glazewm_workspaces"
      center:
        - "clock"
      right:
        - "systray"
        - "bluetooth"
        - "memory"
        - "wifi"
        - "volume"
        # - "battery"
        - "power_menu"

## ============================================================================
## WIDGET DEFINITIONS
## ============================================================================
widgets:

  # ---------------------------------------------------------------------------
  # LEFT MODULES
  # ---------------------------------------------------------------------------

  arch_logo:
    type: "yasb.home.HomeWidget"
    options:
      label: "  "
      system_menu: true
      power_menu: true
      blur: true
      border_color: "None"
      container_padding: 
        top: 0
        left: 6
        bottom: 0
        right: 4

  glazewm_workspaces:
    type: "glazewm.workspaces.GlazewmWorkspacesWidget"
    options:
      offline_label: "GlazeWM Offline"
      hide_empty_workspaces: true
      animation: true

  # ---------------------------------------------------------------------------
  # CENTER MODULES
  # ---------------------------------------------------------------------------

  clock:
    type: "yasb.clock.ClockWidget"
    options:
      label: "  {%I:%M %p}"
      label_alt: "  {%a, %d %b %Y}"
      locale: "en_US"
      timezones: []
      calendar: 
        blur: true
        show_holidays: true
        country_code: "IN"
        holiday_color: "#f38ba8" 
        alignment: "center"
        direction: "down"
        show_week_numbers: true
      label_shadow: { enabled: true, color: "black", radius: 3, offset: [1, 1] }

  # ---------------------------------------------------------------------------
  # RIGHT MODULES
  # ---------------------------------------------------------------------------

  systray:
    type: "yasb.systray.SystrayWidget"
    options:
      class_name: "systray"
      icon_size: 16
      label_collapsed: "\uf47d"
      label_expanded: "\uf460"
      label_position: "right"
      show_unpinned_button: true
      show_unpinned: false
      pin_click_modifier: "alt"

  bluetooth:
    type: "yasb.bluetooth.BluetoothWidget"
    options:
      label: "<span>{icon}</span>"
      label_alt: "󰂱 {device_count}"
      label_no_device: "󰂲"
      max_length: 10
      max_length_ellipsis: "..."
      icons: 
        bluetooth_on: "󰂯"
        bluetooth_off: "󰂲"
        bluetooth_connected: "󰂱"
      callbacks: 
        on_right: "toggle_label"
        on_middle: "exec cmd.exe /c start ms-settings:bluetooth"

  memory:
    type: "yasb.memory.MemoryWidget"
    options:
      label: "󰍛 {percent}%"
      label_alt: "VIRT: {virtual_mem_used}/{virtual_mem_total}"
      update_interval: 5000
      callbacks: 
        on_left: "exec taskmgr.exe"
        on_right: "toggle_label" 
      progress_bar: 
        enabled: false

  wifi:
    type: "yasb.wifi.WifiWidget"
    options:
      label: "<span>{wifi_icon}</span>"
      label_alt: "{wifi_name} {wifi_strength}%"
      update_interval: 5000
      ethernet_icon: "󰀂"
      wifi_icons: [
        "󰤯", "󰤟", "󰤢", "󰤥", "󰤨"
      ]
      callbacks:
        on_left: "toggle_menu"
        on_middle: "exec cmd.exe /c start ms-settings:network"
        on_right: "toggle_label"
      menu_config:
        blur: true
        alignment: "right"
        direction: "down"
        offset_top: 6
        offset_left: 0

  volume:
    type: "yasb.volume.VolumeWidget"
    options:
      label: "<span>{icon}</span>"
      label_alt: "Volume : {level}%"
      volume_icons:
        - "󰝟"
        - "󰖀"
        - "󰕾"
        - ""
      callbacks:
        on_left: "toggle_volume_menu"
        on_right: "toggle_mute"
        on_middle: "exec control mmsys.cpl sounds"
      audio_menu:
        blur: true
        border_color: "None"
        alignment: "center"
        direction: "down"
        offset_top: 6
        offset_left: 0
        show_apps: true
        show_app_labels: false
        show_app_icons: true

  # battery:
  #   type: "yasb.battery.BatteryWidget"
  #   options:
  #     label: "{capacity}% {icon}"
  #     label_alt: "{time_remaining} remaining"
  #     charging_options:
  #       label: "Charged "
  #     icons:
  #       charging: ["󰢜", "󰂆", "󰂇", "󰂈", "󰢝", "󰂉", "󰢞", "󰂊", "󰂋", "󰂅"]
  #       discharging: ["󰁺", "󰁻", "󰁼", "󰁽", "󰁾", "󰁿", "󰂀", "󰂁", "󰂂", "󰁹"]

  power_menu:
    type: "yasb.power_menu.PowerMenuWidget"
    options:
      label: "󰤆"
      uptime: true
      blur_background: true
      buttons:
        shutdown: ["\uf011", "Shut Down"]
        restart: ["\uead2", "Restart"]
        signout: ["\udb80\udf43", "Sign out"]
        hibernate: ["\uf28e", "Hibernate"]
        sleep: ["\u23fe", "Sleep"]
        cancel: ["\ueab8", "Close"]