## ============================================================================
## GLOBAL SETTINGS
## ============================================================================
watch_stylesheet: true   # Auto-reload styles.css on change
watch_config: true       # Auto-reload config.yaml on change
debug: false
update_check: true

## ============================================================================
## BAR CONFIGURATION
## ============================================================================
bars:
  primary-bar:
    enabled: true
    class_name: "yasb-bar"
    alignment: 
      position: "top"
      center: false 
    dimensions:
      width: "100%"
      height: 32 
    padding:  
      top: 0
      left: 0
      bottom: 0
      right: 0 
    window_flags:  
      always_on_top: false
      windows_app_bar: true 
    blur_effect:  
      enabled: true
      acrylic: false
      dark_mode: false 
    
    # Widget Layout
    widgets:
      left: 
        # - "home"
        - "glazewm_workspaces"
        - "media"
      center:
        - "clock"
        # - "weather"
        - "open_meteo"
      right:
        - "systray"
        - "grouped_metric_widgets"  # Traffic, CPU, Memory
        - "grouped_system_widgets"  # Vol, Mic, Brightness, Wifi, BT, Notifs, Power

## ============================================================================
## WIDGET DEFINITIONS
## ============================================================================
widgets:

  # --- GROUPERS ---
  
  # === Group: System Controls (Grouper) ===
  grouped_system_widgets:
    type: "yasb.grouper.GrouperWidget"
    options:
      class_name: "grouped-widgets controls-group"
      container_padding: 
        top: 0
        left: 2
        bottom: 0
        right: 6 
      widgets:
        - "bluetooth"
        - "microphone"
        - "volume"
        - "brightness"
        - "wifi"
        - "notifications"
        - "power_menu"

  # === Group: Metric Widgets (Grouper) ===
  grouped_metric_widgets:
    type: "yasb.grouper.GrouperWidget"
    options:
      class_name: "grouped-widgets"
      container_padding: 
        top: 0
        left: 2
        bottom: 0
        right: 6
      widgets:
        - "traffic"
        - "cpu"
        - "memory"

  # --- LEFT MODULES ---

  home:
    type: "yasb.home.HomeWidget"
    options:
      label: "\ue62a"
      system_menu: true
      power_menu: true
      blur: true
      border_color: "None"
      container_padding: 
        top: 0
        left: 6
        bottom: 0
        right: 4
      menu_list:
        - { title: "User Home", path: "~" }
        - { title: "Download", path: "~\\Downloads" }
        - { title: "Documents", path: "~\\Documents" }
        - { title: "Pictures", path: "~\\Pictures" }

  glazewm_workspaces:
    type: "glazewm.workspaces.GlazewmWorkspacesWidget"
    options:
      offline_label: "GlazeWM Offline"
      hide_empty_workspaces: true
      animation: true

  media:
    type: "yasb.media.MediaWidget"
    options:
      label: "{title}"
      label_alt: "{title} - {artist}"
      hide_empty: true
      show_thumbnail: true
      controls_left: false
      controls_hide: false
      thumbnail_edge_fade: true
      thumbnail_padding: 32
      max_field_size:
        label: 16
        label_alt: 45
      callbacks: 
        on_left: "toggle_media_menu"
        on_middle: "toggle_play_pause"
        on_right: "toggle_label"
      progress_bar:
        enabled: true
        alignment: "bottom"
      scrolling_label:
        enabled: true
        update_interval_ms: 50
        style: "left"
        separator: " "
        label_padding: 2
        ease_slope: 20
        ease_pos: 0.8
        ease_min: 0.5
      icons: 
        prev_track: "\ue892"
        next_track: "\ue893"
        play: "\ue768"
        pause: "\ue769"
      media_menu: 
        blur: true
        border_color: "None"
        alignment: "right"
        direction: "down"
        offset_top: 6
        offset_left: 0
        thumbnail_corner_radius: 4
        thumbnail_size: 80
        max_title_size: 60
        max_artist_size: 20
        show_source: true
      media_menu_icons:
        play: "\ue768"
        pause: "\ue769"
        prev_track: "\ue892"
        next_track: "\ue893"

  # --- CENTER MODULES ---

  clock:
    type: "yasb.clock.ClockWidget"
    options:
      label: "{%a %Y-%m-%d %H:%M:%S}"
      label_alt: "{%a %Y-%m-%d %H:%M:%S}"
      locale: "en_US"
      timezones: []
      calendar: 
        blur: true
        show_holidays: true
        country_code: "IN"
        holiday_color: "#e06c75" # One Dark Red
        alignment: "center"
        direction: "down"
        show_week_numbers: true
      label_shadow: { enabled: true, color: "black", radius: 3, offset: [1, 1] }
  open_meteo:
    type: "yasb.open_meteo.OpenMeteoWidget"
    options:
      label: "<span>{icon}</span> {temp}"
      label_alt: "{location}: Min {min_temp}, Max {max_temp}, Humidity {humidity}"
      tooltip: true
      update_interval: 600
      hide_decimal: true
      units: "metric"
      callbacks:
        on_left: "toggle_card"
        on_middle: "do_nothing"
        on_right: "toggle_label"
      icons:
        sunnyDay: "\udb81\udd99"
        clearNight: "\ue3c2"
        cloudyDay: "\ue21d"
        cloudyNight: "\ue226"
        drizzleDay: "\udb81\ude7e"
        drizzleNight: "\udb81\ude7e"
        rainyDay: "\ue371"
        rainyNight: "\ue371"
        snowyDay: "\ue30a"
        snowyNight: "\ue335"
        foggyDay: "\ue303"
        foggyNight: "\ue346"
        thunderstormDay: "\ue30f"
        thunderstormNight: "\ue338"
        default: "\udb81\udd99"
      weather_card:
        blur: true
        round_corners: true
        round_corners_type: "small"
        border_color: "#7aa2f7"
        alignment: "center"
        direction: "down"
        offset_top: 0
        icon_size: 48

  # --- RIGHT MODULES ---

  systray:
    type: "yasb.systray.SystrayWidget"
    options:
      class_name: "systray"
      icon_size: 16
      label_collapsed: "\uf47d"
      label_expanded: "\uf460"
      label_position: "right"
      show_unpinned_button: true
      show_unpinned: false
      pin_click_modifier: "alt"

  traffic:
    type: "yasb.traffic.TrafficWidget"
    options:
      label: "<span>\ueab4</span> {download_speed} <span>\ueab7</span> {upload_speed} | "
      label_alt: "<span>\ueab4</span> {download_speed} <span>\ueab7</span> {upload_speed} | "
      speed_unit: "bits"
      hide_decimal: true
      callbacks:
        on_left: "toggle_menu"
        on_right: "toggle_label"
      menu:
        blur: true
        alignment: "left"
        direction: "down"
        offset_top: 6
        offset_left: 0
      label_shadow: { enabled: true, color: "black", radius: 3, offset: [1, 1] }

  cpu:
    type: "yasb.cpu.CpuWidget"
    options:
      label: "CPU"
      label_alt: "CPU {info[percent][total]:.0f}%"
      update_interval: 2000
      callbacks: 
        on_left: "exec taskmgr.exe"
        on_right: "toggle_label"
      progress_bar: 
        enabled: true
        position: "left"
        size: 14
        thickness: 2
        color: "#56b6c2" # One Dark Cyan
        background_color: "#282c34" # One Dark Background

  memory:
    type: "yasb.memory.MemoryWidget"
    options:
      label: "MEM"
      label_alt: "VIRT: {virtual_mem_used}/{virtual_mem_total}"
      update_interval: 5000
      callbacks: 
        on_left: "exec taskmgr.exe"
        on_right: "toggle_label" 
      progress_bar: 
        enabled: true
        size: 14
        thickness: 2
        color: "#56b6c2" # One Dark Cyan
        background_color: "#282c34" # One Dark Background

  bluetooth:
    type: "yasb.bluetooth.BluetoothWidget"
    options:
      label: "<span>{icon}</span>"
      label_alt: "{device_count}"
      label_no_device: "No devices connected"
      label_device_separator: ", "
      max_length: 10
      max_length_ellipsis: "..."
      icons: 
        bluetooth_on: "\udb80\udcaf"
        bluetooth_off: "\udb80\udcb2"
        bluetooth_connected: "\udb80\udcb1"
      callbacks: 
        on_right: "toggle_label"
        on_middle: "exec cmd.exe /c start ms-settings:bluetooth"

  microphone:
    type: "yasb.microphone.MicrophoneWidget"
    options:
      label: "<span>{icon}</span>"
      label_alt: "<span>{icon}</span> {level}"
      icons: 
        normal: "\uf130"
        muted: "\uf131" 
      callbacks: 
        on_left: "toggle_mic_menu"
        on_middle: "exec cmd.exe /c start ms-settings:sound"
        on_right: "toggle_mute"
      mic_menu:
        blur: true
        border_color: "None"
        alignment: "right"
        direction: "down"

  volume:
    type: "yasb.volume.VolumeWidget"
    options:
      label: "<span>{icon}</span>"
      label_alt: "{level}"
      volume_icons:
        - "\ueee8"
        - "\uf026"
        - "\uf027"
        - "\uf027"
        - "\uf028"
      callbacks:
        on_left: "toggle_volume_menu"
        on_right: "toggle_mute"
        on_middle: "exec control mmsys.cpl sounds"
      audio_menu:
        blur: true
        border_color: "None"
        alignment: "center"
        direction: "down"
        offset_top: 6
        offset_left: 0
        show_apps: true
        show_app_labels: false
        show_app_icons: true
      container_padding:
        top: 0
        left: 2
        bottom: 0
        right: 2

  brightness:
    type: "yasb.brightness.BrightnessWidget"
    options:
      label: "<span>{icon}</span>"
      label_alt: "Brightness {percent}%"
      hide_unsupported: true
      brightness_toggle_level: [0, 50, 100]
      brightness_icons: [
        "\udb80\udcde",  # Icon for 0-25% brightness
        "\udb80\udcdd",  # Icon for 26-50% brightness
        "\udb80\udcdf",  # Icon for 51-75% brightness
        "\udb80\udce0"   # Icon for 76-100% brightness
      ]
      callbacks: 
        on_left: "toggle_brightness_menu"
        on_right: "toggle_label" 
      brightness_menu:
        blur: true
        border_color: "None"
        alignment: "center"
        direction: "down"
        offset_top: 6
        offset_left: 0
      container_padding: 
        top: 0
        left: 2
        bottom: 0
        right: 2

  wifi:
    type: "yasb.wifi.WifiWidget"
    options:
      label: "<span>{wifi_icon}</span>"
      label_alt: "{wifi_name} {wifi_strength}%"
      update_interval: 5000
      ethernet_icon: "\ueba9"
      wifi_icons: [
        "\udb82\udd2e",  # Icon for 0% strength
        "\udb82\udd1f",  # Icon for 1-24% strength
        "\udb82\udd22",  # Icon for 25-49% strength
        "\udb82\udd25",  # Icon for 50-74% strength
        "\udb82\udd28"   # Icon for 75-100% strength
      ]
      callbacks:
        on_left: "toggle_menu"
        on_middle: "exec cmd.exe /c start ms-settings:network"
        on_right: "toggle_label"
      menu_config:
        blur: true
        alignment: "right"
        direction: "down"
        offset_top: 6
        offset_left: 0

  notifications:
    type: "yasb.notifications.NotificationsWidget"
    options:
      label: "<span>\uf476</span> {count}"
      label_alt: "{count} notifications"
      hide_empty: true
      callbacks:
        on_left: "toggle_notification"
        on_right: "do_nothing"
        on_middle: "toggle_label"
      container_padding:
        top: 0
        left: 4
        bottom: 0
        right: 4

  power_menu:
    type: "yasb.power_menu.PowerMenuWidget"
    options:
      label: "\uf011"
      uptime: true
      blur_background: true
      buttons:
        shutdown: ["\uf011", "Shut Down"]
        restart: ["\uead2", "Restart"]
        signout: ["\udb80\udf43", "Sign out"]
        hibernate: ["\uf28e", "Hibernate"] # Added hibernate option
        sleep: ["\u23fe", "Sleep"]
        cancel: ["\ueab8", "Close"]
      container_padding: 
        top: 0
        left: 0
        bottom: 0
        right: 6  
        
