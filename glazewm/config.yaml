# ----------------------------------------------------------------------
# GENERAL SETTINGS
# ----------------------------------------------------------------------
general:
  # Start Yasb status bar on launch
  startup_commands: ["shell-exec C:\\ProgramData\\Microsoft\\Windows\\Start Menu\\Programs\\Yasb.lnk"]
  
  # Focus behavior
  focus_follows_cursor: false
  toggle_workspace_on_refocus: false
  cursor_jump:
    enabled: true
    trigger: 'monitor_focus'
  
  # Taskbar visibility: Show all windows regardless of workspace
  show_all_in_taskbar: true

# ----------------------------------------------------------------------
# APPEARANCE (GAPS & BORDERS)
# ----------------------------------------------------------------------
gaps:
  inner_gap: '4px'
  outer_gap:
    top: '2px'
    right: '2px'
    bottom: '2px'
    left: '2px'

window_effects:
  focused_window:
    border:
      enabled: true
      color: '#f9e2af' # Yellow
    corner_style:
      enabled: true
      style: 'square'
# ----------------------------------------------------------------------
# WINDOW BEHAVIOR
# ----------------------------------------------------------------------
window_behavior:
  initial_state: 'tiling' # New windows tile by default
  state_defaults:
    floating:
      centered: true
      shown_on_top: false
    fullscreen:
      maximized: false
      shown_on_top: false

# ----------------------------------------------------------------------
# WORKSPACES
# ----------------------------------------------------------------------
workspaces:
  - name: "1"
  - name: "2"
  - name: "3"
  - name: "4"
  - name: "5"
  - name: "6"
  - name: "7"
  - name: "8"
  - name: "9"

# ----------------------------------------------------------------------
# WINDOW RULES
# ----------------------------------------------------------------------
window_rules:
  # -- Workspace Assignments --
  - commands: ["move --workspace 1"]
    match: [{ window_process: { regex: "brave" }}]
  - commands: ["move --workspace 2"]
    match: [{ window_process: { regex: "Code" }}]
  - commands: ["move --workspace 3"]
    match: [{ window_process: { regex: "Spotify|Obsidian" }}]
  - commands: ["move --workspace 4"]
    match: [{ window_process: { regex: "Discord|chrome" }}]

  # -- UI Customization --
  # Hide title bar for Alacritty
  - match: [{ window_process: { equals: 'alacritty' }}]
    commands: ['set-title-bar-visibility hidden']

  # -- Ignore Rules (Prevent Tiling) --
  - commands: ['ignore']
    match:
      - window_process: { equals: 'zebar' }
      - window_process: { equals: 'msrdc' } # Linux GUI host
      # Picture-in-Picture
      - window_title: { regex: '[Pp]icture.in.[Pp]icture' }
        window_class: { regex: 'Chrome_WidgetWin_1|MozillaDialogClass' }
      # PowerToys & System Utilities
      - window_process: { equals: 'PowerToys' }
        window_class: { regex: 'HwndWrapper\[PowerToys\.PowerAccent.*?\]' }
      - window_process: { equals: 'PowerToys' }
        window_title: { regex: '.*? - Peek' }
      - window_process: { equals: 'Lively' }
        window_class: { regex: 'HwndWrapper' }
      # Office Popups
      - window_process: { equals: 'EXCEL' }
        window_class: { not_regex: 'XLMAIN' }
      - window_process: { equals: 'WINWORD' }
        window_class: { not_regex: 'OpusApp' }
      - window_process: { equals: 'POWERPNT' }
        window_class: { not_regex: 'PPTFrameClass' }

# ----------------------------------------------------------------------
# BINDING MODES
# ----------------------------------------------------------------------
binding_modes:
  - name: 'resize'
    keybindings:
      - commands: ['resize --width -2%']
        bindings: ['h', 'left']
      - commands: ['resize --width +2%']
        bindings: ['l', 'right']
      - commands: ['resize --height +2%']
        bindings: ['k', 'up']
      - commands: ['resize --height -2%']
        bindings: ['j', 'down']
      - commands: ['wm-disable-binding-mode --name resize']
        bindings: ['escape', 'enter']

# ----------------------------------------------------------------------
# KEYBINDINGS
# ----------------------------------------------------------------------
keybindings:
  # -- Core Window Management --
  - commands: ['focus --direction left']
    bindings: ['alt+h']
  - commands: ['focus --direction right']
    bindings: ['alt+l']
  - commands: ['focus --direction up']
    bindings: ['alt+k']
  - commands: ['focus --direction down']
    bindings: ['alt+j']

  - commands: ['move --direction left']
    bindings: ['alt+shift+h']
  - commands: ['move --direction right']
    bindings: ['alt+shift+l']
  - commands: ['move --direction up']
    bindings: ['alt+shift+k']
  - commands: ['move --direction down']
    bindings: ['alt+shift+j']

  # -- Window State --
  - commands: ['close']
    bindings: ['alt+q']
  - commands: ['toggle-tiling']
    bindings: ['alt+t']
  - commands: ['toggle-fullscreen']
    bindings: ['alt+f']
  - commands: ['toggle-tiling-direction']
    bindings: ['alt+v']

  # -- GlazeWM System Control --
  - commands: ['wm-enable-binding-mode --name resize']
    bindings: ['alt+r']
  - commands: ['wm-toggle-pause']
    bindings: ['alt+shift+p']
  - commands: ['wm-exit']
    bindings: ['alt+shift+e']
  - commands: ['wm-reload-config']
    bindings: ['alt+shift+r']
  # - commands: ['wm-redraw']
  #   bindings: ['alt+shift+w']
  - commands: ['focus --recent-workspace']
    bindings: ["alt+`"]

  # -- Workspace Navigation (Focus: Alt+#, Move: Alt+Shift+#) --
  - commands: ['focus --workspace 1']
    bindings: ['alt+1']
  - commands: ['focus --workspace 2']
    bindings: ['alt+2']
  - commands: ['focus --workspace 3']
    bindings: ['alt+3']
  - commands: ['focus --workspace 4']
    bindings: ['alt+4']
  - commands: ['focus --workspace 5']
    bindings: ['alt+5']
  - commands: ['focus --workspace 6']
    bindings: ['alt+6']
  - commands: ['focus --workspace 7']
    bindings: ['alt+7']
  - commands: ['focus --workspace 8']
    bindings: ['alt+8']
  - commands: ['focus --workspace 9']
    bindings: ['alt+9']

  - commands: ["move --workspace 1", "focus --workspace 1"]
    bindings: ["alt+shift+1"]
  - commands: ["move --workspace 2", "focus --workspace 2"]
    bindings: ["alt+shift+2"]
  - commands: ["move --workspace 3", "focus --workspace 3"]
    bindings: ["alt+shift+3"]
  - commands: ["move --workspace 4", "focus --workspace 4"]
    bindings: ["alt+shift+4"]
  - commands: ["move --workspace 5", "focus --workspace 5"]
    bindings: ["alt+shift+5"]
  - commands: ["move --workspace 6", "focus --workspace 6"]
    bindings: ["alt+shift+6"]
  - commands: ["move --workspace 7", "focus --workspace 7"]
    bindings: ["alt+shift+7"]
  - commands: ["move --workspace 8", "focus --workspace 8"]
    bindings: ["alt+shift+8"]
  - commands: ["move --workspace 9", "focus --workspace 9"]
    bindings: ["alt+shift+9"]

  # -- Application Shortcuts --
  - commands: ["shell-exec wt"]
    bindings: ["alt+p"]
    
  - commands: ["shell-exec explorer"]
    bindings: ["alt+e"]
    
  - commands: ["shell-exec brave"]
    bindings: ["alt+b"]
    
  - commands: ["shell-exec chrome"]
    bindings: ["alt+g"]

  - commands: ["shell-exec C:\\Users\\ayush\\Desktop\\Visual Studio Code.lnk"]
    bindings: ["alt+c"]

  - commands: ["shell-exec C:\\Users\\ayush\\Desktop\\Obsidian.lnk"]
    bindings: ["alt+o"]

  - commands: ["shell-exec C:\\Users\\ayush\\Desktop\\Spotify.lnk"]
    bindings: ["alt+m"]

  - commands: ["shell-exec C:\\Users\\ayush\\Desktop\\Discord.lnk"]
    bindings: ["alt+d"]
  
  - commands: ["shell-exec C:\\Users\\ayush\\Desktop\\Ubuntu.lnk"]
    bindings: ["alt+enter"]

  - commands: ["shell-exec C:\\Users\\ayush\\Desktop\\Steam.lnk"]
    bindings: ["alt+s"]

  # -- Yasb Control --
  - commands: ['shell-exec yasbc start']
    bindings: ["alt+shift+s"] # Show bar
  - commands: ['shell-exec yasbc stop']
    bindings: ["alt+shift+g"] # Hide bar